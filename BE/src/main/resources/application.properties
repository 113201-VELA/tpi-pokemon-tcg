##### Application properties #####
app.name=tcg-backend
app.desc=Pokémon TCG — Backend
app.version=0.0.1-SNAPSHOT
app.url=http://localhost:8080
app.dev-name=John Doe
app.dev-email=dummy@dummy.com

##### SPRING DOC PROPERTIES #####
springdoc.packages-to-scan=com.pokemon.tcg.api
springdoc.show-actuator=true
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.path=/swagger-ui.html

##### DATASOURCE #####
spring.datasource.url=jdbc:postgresql://localhost:5432/pokemon_tcg?options=-c%20timezone=UTC
spring.datasource.username=pokemon_user
spring.datasource.password=pokemon_pass
spring.datasource.driver-class-name=org.postgresql.Driver

##### JPA #####
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

##### FLYWAY #####
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

##### JWT #####
app.jwt.secret=cambia-esta-clave-por-una-de-256-bits-en-produccion
app.jwt.expiration-ms=86400000

##### POKEMON TCG API #####
pokemon-tcg.api.base-url=https://api.pokemontcg.io/v2
pokemon-tcg.api.key=${POKEMON_TCG_API_KEY:}
pokemon-tcg.cache.set-id=xy1

##### LOGGING #####
logging.level.com.pokemon.tcg=DEBUG
logging.level.org.springframework.web.socket=INFO
logging.level.root=WARN
