##### Application properties #####
app.name=tcg-backend
app.desc=Pokémon TCG — Backend
app.version=0.0.1-SNAPSHOT
app.url=http://localhost:8080
app.dev-name=John Doe
app.dev-email=dummy@dummy.com

##### SPRING DOC PROPERTIES #####
springdoc.packages-to-scan=com.pokemon.tcg.api
springdoc.show-actuator=true
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.path=/swagger-ui.html

##### DATASOURCE (H2 for tests) #####
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

##### JPA #####
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

##### FLYWAY (disabled for tests) #####
spring.flyway.enabled=false

##### JWT #####
app.jwt.secret=test-secret-key-for-testing-purposes-only
app.jwt.expiration-ms=86400000

##### POKEMON TCG API #####
pokemon-tcg.api.base-url=https://api.pokemontcg.io/v2
pokemon-tcg.api.key=
pokemon-tcg.cache.set-id=xy1

##### LOGGING #####
logging.level.com.pokemon.tcg=DEBUG
logging.level.root=WARN
